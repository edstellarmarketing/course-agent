name: alert-approval-rate

# Phase 9 Step 6 — alert #2.
# Weekly Mon 08:00 UTC. Daily cadence would noise out — a 10-decision
# minimum per window already guards against early-life jumpiness.
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: agent-production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install engine dependencies
        run: uv --directory engine sync

      - name: Pin Supabase hostname → IP
        run: |
          echo "187.127.140.202 supabasekong-dfpiopwrqgdf8iods10d4546.187.127.140.202.sslip.io" | sudo tee -a /etc/hosts

      - name: Run check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ALERTS_SLACK_WEBHOOK_URL: ${{ secrets.ALERTS_SLACK_WEBHOOK_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_ENGINE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: uv --directory engine run check_approval_rate
