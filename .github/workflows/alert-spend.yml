name: alert-spend

# Phase 9 Step 6 — alert #3.
# Daily 23:55 UTC: sums today's agent_runs.cost_usd and pings Slack
# when above OPENROUTER_DAILY_CEILING_USD (default $10).
on:
  schedule:
    - cron: "55 23 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    environment: agent-production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install engine dependencies
        run: uv --directory engine sync

      - name: Pin Supabase hostname → IP
        run: |
          echo "187.127.140.202 supabasekong-dfpiopwrqgdf8iods10d4546.187.127.140.202.sslip.io" | sudo tee -a /etc/hosts

      - name: Run check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ALERTS_SLACK_WEBHOOK_URL: ${{ secrets.ALERTS_SLACK_WEBHOOK_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_ENGINE }}
          OPENROUTER_DAILY_CEILING_USD: ${{ vars.OPENROUTER_DAILY_CEILING_USD }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: uv --directory engine run check_spend
